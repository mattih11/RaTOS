require conf/distro/xenomai-demo.conf

# Include all RaTOS development headers and CMake config files in the SDK so
# host-side builds targeting the EVL guest can find_package() every dependency.
SDK_INSTALL += "rack-dev libreflect-cpp-dev libsertial-dev"
