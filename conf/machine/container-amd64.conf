#
# RaTOS Real-Time OS — Developer container machine
#
# Mirrors isar/meta-isar/conf/machine/container-amd64.conf but lives in
# the RaTOS layer so meta-isar does not need to be added as a bblayers entry.
#
# SPDX-License-Identifier: GPL-3.0-or-later
#

DISTRO_ARCH = "amd64"

# Produce the Docker rootfs archive (primary output), a raw ext4 image for
# QEMU local boot, and a compressed wic image for release artifacts.
# The ext4 approach matches upstream xenomai-images/qemu-machine.inc:
#   boot with -device ide-hd and root=/dev/sda. CONFIG_SATA_AHCI=y so the
#   AHCI driver is built in — no initramfs injection needed.
#   Use a single console=ttyS0 (no console=tty0) so systemd-getty-generator
#   auto-starts serial-getty@ttyS0 and ttyS0 is /dev/console.
IMAGE_FSTYPES ?= "docker-archive.gz ext4 wic.gz"

# Boot the ext4 image with (see scripts/start-qemu.sh):
#   qemu-system-x86_64 \
#     -kernel vmlinuz -initrd initrd.img \
#     -drive file=ratos-dev-image-container-amd64.ext4 \
#     -device ide-hd,drive=disk \
#     -append "root=/dev/sda rw console=ttyS0,115200 console=tty0"
# The ratos distro sets WKS_FILE to ${MACHINE}.wks for the wic.gz artifact.

MACHINE_SERIAL ?= "ttyS0"
BAUDRATE_TTY   ?= "115200"

