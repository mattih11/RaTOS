#
# RaTOS Real-Time OS — Developer container machine
#
# Mirrors isar/meta-isar/conf/machine/container-amd64.conf but lives in
# the RaTOS layer so meta-isar does not need to be added as a bblayers entry.
#
# SPDX-License-Identifier: GPL-3.0-or-later
#

DISTRO_ARCH = "amd64"

# Produce the Docker rootfs archive (primary output) and a QEMU-bootable raw
# disk image alongside it. wic is listed before wic.gz so ISAR builds the raw
# image first and then compresses it.
IMAGE_FSTYPES ?= "docker-archive.gz wic wic.gz"

# Single ext4 partition, no bootloader. Boot the wic image with:
#   qemu-system-x86_64 \
#     -kernel vmlinuz -initrd initrd.img \
#     -hda ratos-dev-image-container-amd64.wic \
#     -append "root=LABEL=root rw console=ttyS0,115200 console=tty0"
# The ratos distro defaults WKS_FILE to ${MACHINE}.wks, so wic/container-amd64.wks is used.

MACHINE_SERIAL ?= "ttyS0"
BAUDRATE_TTY   ?= "115200"

