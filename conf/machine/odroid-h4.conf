#
# Odroid H4 / H4 Plus (Intel Alder Lake-N N97, x86-64 EFI).
# Uses EFI Boot Guard (efibootguard from isar-cip-core) as bootloader.
# EBG handles both single-root development builds and A/B SWUpdate OTA builds.
#

DISTRO_ARCH = "amd64"

IMAGE_FSTYPES ?= "wic wic.gz"

# EFI Boot Guard – required by both single-root (odroid-h4.wks) and
# A/B SWUpdate (odroid-h4-efibootguard.wks.in) layouts.
# The efibootguard-boot wic plugin copies the kernel into the BOOT partition.
IMAGER_INSTALL:wic += "efibootguard:${DISTRO_ARCH} efibootguard-tools:${DISTRO_ARCH}"

# EFI Boot Guard wic plugin variables
EFI_ARCH = "x64"
EFI_LIB_ARCH = "x86_64-linux-gnu"
WDOG_TIMEOUT ?= "60"
WICVARS += "EFI_ARCH EFI_LIB_ARCH WDOG_TIMEOUT KERNEL_IMAGE INITRD_DEPLOY_FILE"

# factory-reset-helper variant for EFI machines (provided by isar-cip-core)
PREFERRED_PROVIDER_factory-reset-helper = "factory-reset-helper-efi"
